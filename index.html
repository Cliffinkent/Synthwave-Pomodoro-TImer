<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Synth Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="grid-floor" aria-hidden="true"></div>
    <div class="shimmer" aria-hidden="true"></div>

    <main id="app" class="timer-shell">
      <div
        class="timer-card app-container focus-mode"
        id="app-container"
      >
        <h1 class="app-title">SYNTH POMODORO</h1>

        <div
          id="session-indicator"
          class="session-indicator session-tag"
          role="status"
          aria-live="polite"
        >
          FOCUS
        </div>

        <div class="timer-block">
          <div id="timer-display" class="timer-readout">25:00</div>
        </div>

        <fieldset class="duration-fields">
          <legend class="visually-hidden">Session lengths in minutes</legend>
          <div class="field-row">
            <label for="focus-minutes-input">Focus (min)</label>
            <input
              id="focus-minutes-input"
              name="focusMinutes"
              type="number"
              min="1"
              max="180"
              value="25"
              inputmode="numeric"
              aria-describedby="focusMinutes-hint"
            />
            <span id="focusMinutes-hint" class="field-hint"
              >1–180 minutes</span
            >
          </div>
          <div class="field-row">
            <label for="break-minutes-input">Break (min)</label>
            <input
              id="break-minutes-input"
              name="breakMinutes"
              type="number"
              min="1"
              max="180"
              value="5"
              inputmode="numeric"
              aria-describedby="breakMinutes-hint"
            />
            <span id="breakMinutes-hint" class="field-hint"
              >1–180 minutes</span
            >
          </div>
        </fieldset>

        <div class="controls">
          <button
            type="button"
            id="start-button"
            class="btn btn-start"
            aria-pressed="false"
          >
            Start
          </button>
          <button
            type="button"
            id="reset-button"
            class="btn btn-reset"
            aria-label="Reset timer to focus session and configured focus length"
          >
            Reset
          </button>
        </div>

        <div class="stats-panel" id="stats-panel">
          <h2 class="stats-title">Stats</h2>
          <div class="stats-row">
            <span>Total Focus Sessions:</span>
            <span id="stats-sessions">0</span>
          </div>
          <div class="stats-row">
            <span>Total Focus Minutes:</span>
            <span id="stats-minutes">0</span>
          </div>
          <button
            type="button"
            id="clear-stats-button"
            class="neon-btn"
          >
            Clear Stats
          </button>
        </div>
      </div>

      <footer class="app-footer">Retro Synthwave Pomodoro</footer>
    </main>

    <audio id="session-sound" preload="auto">
      <source
        src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="
        type="audio/wav"
      />
    </audio>
  </body>
</html>
