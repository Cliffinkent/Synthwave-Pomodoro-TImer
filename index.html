<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Synth Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div class="app-container focus-mode" id="app-container">
        <header class="app-header">
          <h1 class="app-title">SYNTH POMODORO</h1>
          <p class="app-subtitle">
            25 / 5 with long breaks every 4 focus blocks
          </p>
        </header>

        <div class="session-indicator" id="session-indicator">FOCUS</div>
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="cycle-indicator" id="cycle-indicator">
          Focus block 1 of 4
        </div>

        <section class="settings">
          <h2 class="section-title">Durations</h2>
          <div class="settings-row">
            <label for="focus-minutes-input">Focus (min)</label>
            <input
              id="focus-minutes-input"
              type="number"
              min="1"
              max="180"
              value="25"
            />
          </div>
          <div class="settings-row">
            <label for="break-minutes-input">Short break (min)</label>
            <input
              id="break-minutes-input"
              type="number"
              min="1"
              max="60"
              value="5"
            />
          </div>
          <div class="settings-row">
            <label for="long-break-minutes-input">Long break (min)</label>
            <input
              id="long-break-minutes-input"
              type="number"
              min="1"
              max="60"
              value="15"
            />
          </div>
        </section>

        <section class="controls">
          <button id="start-button" class="neon-btn primary-btn" type="button">
            Start
          </button>
          <button id="reset-button" class="neon-btn secondary-btn" type="button">
            Reset
          </button>
        </section>

        <section class="stats-panel" id="stats-panel">
          <h2 class="stats-title">Stats</h2>
          <div class="stats-row">
            <span>Total Focus Sessions:</span>
            <span id="stats-sessions">0</span>
          </div>
          <div class="stats-row">
            <span>Total Focus Minutes:</span>
            <span id="stats-minutes">0</span>
          </div>

          <hr class="stats-divider" />
          <h3 class="stats-subtitle">Insights</h3>
          <div class="stats-insights">
            <div class="stats-insight">
              <span class="stats-insight-label">Today</span>
              <span class="stats-insight-value" id="stats-today"
                >0 min (0 sessions)</span
              >
            </div>
            <div class="stats-insight">
              <span class="stats-insight-label">Last 7 days</span>
              <span class="stats-insight-value" id="stats-last7">0 min</span>
            </div>
            <div class="stats-insight">
              <span class="stats-insight-label">Streak</span>
              <span class="stats-insight-value" id="stats-streak">0 days</span>
            </div>
          </div>

          <button id="clear-stats-button" class="neon-btn" type="button">
            Clear Stats
          </button>
        </section>
      </div>
    </main>

    <audio id="session-sound" preload="auto">
      <source
        src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="
        type="audio/wav"
      />
    </audio>
    <script src="script.js"></script>
  </body>
</html>
